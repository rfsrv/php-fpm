; WordPress-specific PHP settings.
; These are applied on top of the base image's php.ini and opcache.ini.

; File uploads — allow reasonably large media
upload_max_filesize = 64M
post_max_size       = 72M

; Execution limits — give background tasks (themes, plugins, imports) room
max_execution_time = 300
max_input_time     = 300

; Memory — WordPress with plugins benefits from headroom
memory_limit = 256M

; Input vars — required for large option pages / complex menus
max_input_vars = 3000
